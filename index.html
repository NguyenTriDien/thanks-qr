<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trò Chơi Vui Vẻ</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(135deg,#FF6B6B,#FF8E53,#FFA500,#FFD93D);
  background-size:400% 400%;
  animation:bgShift 8s ease infinite;
  color:white;
}
@keyframes bgShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.container{
  text-align:center;
  z-index:10;
}
.title{
  font-size:50px;
  margin-bottom:30px;
  text-shadow:2px 2px 8px rgba(0,0,0,.3);
  animation:bounce 1s infinite;
}
.game-board{
  display:grid;
  grid-template-columns:repeat(5,100px);
  gap:15px;
  margin-bottom:40px;
  perspective:1000px;
}
.round-slot{
  width:100px;
  height:100px;
  background:rgba(255,255,255,.3);
  border:3px solid white;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  cursor:pointer;
  transition:all .3s;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  position:relative;
}
.round-slot:hover{
  transform:scale(1.1);
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}
.round-slot.spinning{
  animation:spin 0.5s linear;
}
@keyframes spin{
  0%{transform:rotateY(0) scale(1);}
  50%{transform:rotateY(180deg) scale(1.1);}
  100%{transform:rotateY(0) scale(1);}
}
.round-slot.reveal{
  animation:popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
@keyframes popIn{
  0%{transform:scale(0) rotate(-180deg);}
  100%{transform:scale(1) rotate(0deg);}
}
.round-number{
  position:absolute;
  top:-25px;
  font-size:14px;
  font-weight:bold;
  background:rgba(0,0,0,.3);
  padding:3px 8px;
  border-radius:5px;
}
.controls{
  margin-top:30px;
}
.play-btn{
  padding:15px 40px;
  font-size:24px;
  background:rgba(255,255,255,.9);
  border:none;
  border-radius:50px;
  cursor:pointer;
  transition:all .3s;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  font-weight:bold;
  color:#FF6B6B;
}
.play-btn:hover:not(:disabled){
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,.3);
}
.play-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}
.result-message{
  margin-top:20px;
  font-size:28px;
  min-height:50px;
  animation:slideIn 0.5s ease-out;
}
@keyframes slideIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
.final-result{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.8);
  z-index:100;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow-y:auto;
}
.final-result.show{
  display:flex;
  animation:fadeIn 0.5s;
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
.result-image-container{
  position:relative;
  display:inline-block;
  margin-top:30px;
}
.result-image{
  max-width:500px;
  height:auto;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  animation:bounce-large 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  filter:saturate(1.2) contrast(1.1);
  border:8px solid #FFD93D;
}
.result-image.wiggle{
  animation:wiggle-motion 0.15s infinite !important;
}
@keyframes wiggle-motion{
  0%,100%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
}
@keyframes bounce-large{
  0%{transform:scale(0) rotate(-20deg);}
  50%{transform:scale(1.1) rotate(5deg);}
  100%{transform:scale(1) rotate(0deg);}
}
.laugh-overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
}
.laugh-emoji{
  position:absolute;
  font-size:50px;
  font-weight:bold;
  animation:float-laugh 2.5s ease-in-out infinite;
}
.laugh-1{
  top:-60px;
  left:5%;
  animation-delay:0s;
}
.laugh-2{
  top:-70px;
  right:5%;
  animation-delay:0.3s;
}
.laugh-3{
  bottom:-60px;
  left:10%;
  animation-delay:0.6s;
}
.laugh-4{
  bottom:-60px;
  right:10%;
  animation-delay:0.9s;
}
.laugh-5{
  top:50%;
  left:-60px;
  animation-delay:0.2s;
}
.laugh-6{
  top:50%;
  right:-60px;
  animation-delay:0.5s;
}
@keyframes float-laugh{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-40px) scale(1.2);}
}
.result-text{
  font-size:50px;
  color:white;
  margin-top:50px;
  text-shadow:3px 3px 10px rgba(0,0,0,.7);
  animation:slide-up 0.8s ease-out 0.3s backwards;
}
@keyframes slide-up{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
.tap-message{
  font-size:20px;
  color:white;
  margin-top:30px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{opacity:.6;}
  50%{opacity:1;}
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
.heart-float{
  position:fixed;
  font-size:40px;
  animation:float-heart 4s ease-in forwards;
  z-index:99;
  pointer-events:none;
  text-shadow:2px 2px 4px rgba(0,0,0,.3);
}
@keyframes float-heart{
  0%{
    transform:translateY(0) translateX(0) scale(1);
    opacity:1;
  }
  100%{
    transform:translateY(-120vh) translateX(150px) scale(0);
    opacity:0;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="title">🎮 TRÒ CHƠI VUI VẺ 🎮</div>
  
  <div class="game-board" id="gameBoard"></div>
  
  <div class="controls">
    <button class="play-btn" id="playBtn">🎯 QUAY NÀO!</button>
  </div>
  
  <div class="result-message" id="resultMessage"></div>
</div>

<div class="final-result" id="finalResult">
  <div class="result-image-container">
    <img src="https://raw.githubusercontent.com/NguyenTriDien/thanks-qr/main/result-image.jpg" alt="Kết quả" class="result-image" id="resultImage" onerror="this.style.display='none'">
    <div class="laugh-overlay">
      <div class="laugh-emoji laugh-1">😂</div>
      <div class="laugh-emoji laugh-2">🤣</div>
      <div class="laugh-emoji laugh-3">😆</div>
      <div class="laugh-emoji laugh-4">🥴</div>
      <div class="laugh-emoji laugh-5">🤪</div>
      <div class="laugh-emoji laugh-6">😜</div>
    </div>
  </div>
  <div class="result-text" id="finalText">🎉 HAHAHA 🎉</div>
  <div class="tap-message">Chạm để chơi lại</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const guestName=params.get("name")||"Bạn";

const resultIcons=[
  '😂','🤣','😆','🥰','😍','🤪','😜','🥴',
  '😝','😛','🤨','😏','😒','😪','🤤','😴',
  '🤑','💰','🎉','🎊','🎈','🎁','🏆','👑',
  '💪','🔥','⚡','✨','🌟','⭐','🌙','😎'
];

const funnyMessages=[
  '🎉 CƯỜI BÒ RỒI! 🎉',
  '😂 TỐI TÃM MẮT! 😂',
  '🤣 VUI VÀNG NGOÀI MONG! 🤣',
  '😆 XỒI LỘN TRUYỀN HÌNH! 😆',
  '🥴 HAHAHA CỨT CƯỜI! 🥴',
];

let currentRound=0;
let results=[];

function initGame(){
  const gameBoard=document.getElementById('gameBoard');
  gameBoard.innerHTML='';
  currentRound=0;
  results=[];
  
  for(let i=1;i<=5;i++){
    const slot=document.createElement('div');
    slot.className='round-slot';
    slot.id=`round-${i}`;
    slot.innerHTML=`<div class="round-number">Vòng ${i}</div>❓`;
    gameBoard.appendChild(slot);
  }
  
  document.getElementById('playBtn').disabled=false;
  document.getElementById('resultMessage').innerHTML='';
  document.getElementById('finalResult').classList.remove('show');
}

function playRound(){
  document.getElementById('playBtn').disabled=true;
  const currentSlot=document.getElementById(`round-${currentRound+1}`);
  
  currentSlot.classList.add('spinning');
  
  let spinCount=0;
  const spinInterval=setInterval(()=>{
    currentSlot.innerHTML=resultIcons[Math.floor(Math.random()*resultIcons.length)];
    spinCount++;
    if(spinCount>20){
      clearInterval(spinInterval);
      currentSlot.classList.remove('spinning');
      
      const finalIcon=resultIcons[Math.floor(Math.random()*resultIcons.length)];
      currentSlot.innerHTML=finalIcon;
      results[currentRound]=finalIcon;
      
      currentSlot.classList.add('reveal');
      
      currentRound++;
      
      if(currentRound<5){
        setTimeout(()=>{
          document.getElementById('resultMessage').innerHTML=`✅ Đã hoàn thành ${currentRound}/5 vòng`;
          document.getElementById('playBtn').disabled=false;
        },600);
      }else{
        showFinalResult();
      }
    }
  },100);
}

function showFinalResult(){
  const resultMessage=funnyMessages[Math.floor(Math.random()*funnyMessages.length)];
  document.getElementById('finalText').innerHTML=resultMessage;
  document.getElementById('finalResult').classList.add('show');
  
  setTimeout(()=>{
    document.getElementById('resultImage').classList.add('wiggle');
  },300);
  
  createFloatingHearts();
  fireworks();
}

function createFloatingHearts(){
  const hearts=['❤️','💕','💖','💗','💝','💓','💞','🤣','😂','😆'];
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const heart=document.createElement('div');
      heart.className='heart-float';
      heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
      heart.style.left=Math.random()*100+'%';
      heart.style.top=window.innerHeight+'px';
      document.body.appendChild(heart);
      
      setTimeout(()=>{heart.remove();},4000);
    },i*80);
  }
}

function fireworks(){
  const duration=5000;
  const end=Date.now()+duration;
  (function frame(){
    confetti({particleCount:12,angle:60,spread:70,origin:{x:0}});
    confetti({particleCount:12,angle:120,spread:70,origin:{x:1}});
    confetti({particleCount:15,spread:360,startVelocity:55});
    if(Date.now()<end){
      requestAnimationFrame(frame);
    }
  })();
}

document.getElementById('playBtn').addEventListener('click',playRound);
document.getElementById('finalResult').addEventListener('click',()=>{
  document.getElementById('resultImage').classList.remove('wiggle');
  initGame();
});

initGame();
</script>

</body>
</html>
