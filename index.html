<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Ngủ Ngon Nguyễn Ngọc Quỳnh Hoa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(180deg,#020024,#090979,#000428);
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Stars */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{
        opacity:1;
        box-shadow:0 0 10px white;
    }
}

/* Card */
.card{
    position:relative;
    z-index:10;
    text-align:center;
    padding:40px;
    width:90%;
    max-width:700px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);

    border-radius:30px;
    box-shadow:
    0 0 20px rgba(255,255,255,.15),
    0 0 50px rgba(255,105,180,.15);
}

.title{
    font-family:'Pacifico',cursive;
    font-size:3rem;
    color:#fff;
    text-shadow:
        0 0 10px #ff8ad8,
        0 0 20px #ff8ad8,
        0 0 40px #ff8ad8;
    margin-bottom:15px;
}

.name{
    color:#ffd6f0;
    font-size:2rem;
    font-weight:600;
    margin-bottom:25px;
}

.typing{
    color:white;
    font-size:1.2rem;
    line-height:1.8;
    min-height:100px;
}

.moon{
    font-size:80px;
    animation:float 3s ease-in-out infinite;
    margin-bottom:20px;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.signature{
    margin-top:30px;
    color:#ffe0f5;
    font-style:italic;
}

/* Hearts */
.heart{
    position:absolute;
    color:#ff69b4;
    font-size:20px;
    animation:rise linear forwards;
}

@keyframes rise{
    from{
        transform:translateY(0) scale(0.8);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.8);
        opacity:0;
    }
}

/* Sparkles */
.sparkle{
    position:absolute;
    color:white;
    animation:sparkleFall linear forwards;
}

@keyframes sparkleFall{
    from{
        transform:translateY(-20px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

.footer-heart{
    color:#ff7eb3;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="moon">🌙</div>

    <div class="title">
        Chúc Ngủ Ngon
    </div>

    <div class="name">
        Nguyễn Ngọc Quỳnh Hoa ❤️
    </div>

    <div class="typing" id="typing"></div>

    <div class="signature">
        Chúc bạn có những giấc mơ đẹp nhưng nhớ tỉnh dậy
        <span class="footer-heart">💖</span>
    </div>
</div>

<script>
// Stars
for(let i=0;i<200;i++){
    const star=document.createElement('div');
    star.className='star';

    star.style.left=Math.random()*100+'vw';
    star.style.top=Math.random()*100+'vh';
    star.style.animationDelay=Math.random()*3+'s';

    document.body.appendChild(star);
}

// Hearts
function createHeart(){
    const heart=document.createElement('div');

    heart.className='heart';
    heart.innerHTML='❤';

    heart.style.left=Math.random()*100+'vw';
    heart.style.bottom='-20px';
    heart.style.fontSize=(15+Math.random()*30)+'px';
    heart.style.animationDuration=(4+Math.random()*4)+'s';

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,300);

// Sparkles
function createSparkle(){
    const s=document.createElement('div');

    s.className='sparkle';
    s.innerHTML='✦';

    s.style.left=Math.random()*100+'vw';
    s.style.fontSize=(10+Math.random()*20)+'px';
    s.style.animationDuration=(4+Math.random()*4)+'s';

    document.body.appendChild(s);

    setTimeout(()=>{
        s.remove();
    },8000);
}

setInterval(createSparkle,200);

// Typing Effect
const text = `
Hoa à,

Đủ nắng hoa sẽ nở.

Công việc mà mệt quá. Thì đủ rồi để t yên:)))

`;

let i=0;
const typing=document.getElementById('typing');

function typeWriter(){
    if(i<text.length){
        typing.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

typeWriter();
</script>

</body>
</html>
