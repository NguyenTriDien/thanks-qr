<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Special Thank You</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}
body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483);
  background-size:400% 400%;
  animation:bgShift 12s ease infinite;
  color:white;
}
@keyframes bgShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
#gift{
  font-size:180px;
  cursor:pointer;
  animation:bounce 1s infinite;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.5));
}
@keyframes bounce{
  0%,100%{transform:translateY(0) rotate(-3deg);}
  50%{transform:translateY(-25px) rotate(3deg);}
}
#message{
  display:none;
  text-align:center;
  padding:20px;
  z-index:5;
}
#message h1{
  font-size:60px;
  margin-bottom:20px;
}
#message p{
  font-size:24px;
}
.subtitle{
  font-size:30px;
  margin-top:10px;
  animation:swing 1.5s ease-in-out infinite;
}
@keyframes swing{
  0%,100%{transform:rotate(-8deg);}
  50%{transform:rotate(8deg);}
}
.money{
  position:absolute;
  font-size:35px;
  animation:fall 5s linear forwards;
  z-index:2;
}
@keyframes fall{
  from{transform:translateY(-100px) rotate(0deg);opacity:1;}
  to{transform:translateY(120vh) rotate(720deg);opacity:0;}
}
.shuttle{
  position:absolute;
  font-size:40px;
  animation:floatUp 6s linear forwards;
  z-index:2;
}
@keyframes floatUp{
  from{transform:translateY(110vh) rotate(0deg);opacity:1;}
  to{transform:translateY(-150px) rotate(360deg);opacity:0;}
}
.glow{
  animation:glow 2s infinite;
}
@keyframes glow{
  0%{text-shadow:0 0 10px gold;}
  50%{text-shadow:0 0 30px gold,0 0 60px gold,0 0 90px #ff8c00;}
  100%{text-shadow:0 0 10px gold;}
}
.tap{
  margin-top:20px;
  font-size:22px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{opacity:.6;transform:scale(1);}
  50%{opacity:1;transform:scale(1.1);}
}
#mascot{
  font-size:90px;
  margin-top:20px;
  display:inline-block;
  animation:play 1.2s ease-in-out infinite;
}
@keyframes play{
  0%,100%{transform:translateX(0) rotate(-10deg);}
  50%{transform:translateX(20px) rotate(15deg);}
}
.title-icons{
  font-size:50px;
  display:block;
  margin-bottom:15px;
  animation:spin 4s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div id="gift">🎁</div>

<div class="tap">
  Chạm vào hộp quà 🏸
</div>

<div id="message">
  <span class="title-icons">🏸 ✨ 🏆</span>
  <h1 class="glow">
    🎉 ANH CẢM ƠN 🎉
  </h1>
  <p id="guestName"></p>
  <p class="subtitle">🏸 Hẹn gặp lại trên sân cầu lông! 🏸</p>
  <div id="mascot">🏸</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const guestName=params.get("name")||"";

const gift=document.getElementById("gift");
gift.addEventListener("click",openGift);

function openGift(){
  gift.innerHTML="💥";
  document.querySelector(".tap").style.display="none";
  setTimeout(()=>{
    gift.style.display="none";
    showCelebration();
  },800);
}

function showCelebration(){
  document.getElementById("message").style.display="block";
  document.getElementById("guestName").innerHTML=`<b>${guestName}</b><br>❤️`;
  fireworks360();
  moneyRain();
  shuttleRain();
}

function fireworks360(){
  let duration=6000;
  let end=Date.now()+duration;
  (function frame(){
    confetti({particleCount:6,angle:60,spread:55,origin:{x:0}});
    confetti({particleCount:6,angle:120,spread:55,origin:{x:1}});
    confetti({particleCount:10,spread:360,startVelocity:40});
    if(Date.now()<end){
      requestAnimationFrame(frame);
    }
  })();
}

function moneyRain(){
  const symbols=["💸","💵","💰","🪙","✨"];
  for(let i=0;i<150;i++){
    setTimeout(()=>{
      let money=document.createElement("div");
      money.className="money";
      money.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
      money.style.left=Math.random()*100+"vw";
      money.style.top="-50px";
      document.body.appendChild(money);
      setTimeout(()=>{money.remove();},5000);
    },i*50);
  }
}

function shuttleRain(){
  const symbols=["🏸","🏆","✨","🥇","🎖️"];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      let s=document.createElement("div");
      s.className="shuttle";
      s.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
      s.style.left=Math.random()*100+"vw";
      s.style.animationDuration=(4+Math.random()*4)+"s";
      document.body.appendChild(s);
      setTimeout(()=>{s.remove();},8000);
    },i*120);
  }
}
</script>

</body>
</html>
